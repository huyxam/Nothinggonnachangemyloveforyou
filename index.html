<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>NiNi ❤️</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>

<div id="hearts"></div>
<div id="modal-backdrop" class="modal-backdrop hidden"></div>

<!-- LOGIN -->

<section id="login-screen">

<div class="login-card">

<div class="left-side">

<img src="images/730948705_1334483012113826_7963450557296195364_n.jpg" alt="avatar">

<h2>NiNi ❤️</h2>

<p>Nhập mật khẩu để mở quà</p>

</div>

<div class="right-side">

<div class="heart-icon">
❤️
</div>

<div id="pin-display">
○ ○ ○ ○
</div>

<div class="hint-container">
    <button id="hint-btn" class="hint-btn">Gợi ý mật khẩu</button>

    <div id="hint-popup" class="hint-popup hidden" role="dialog" aria-label="Gợi ý mật khẩu">
        <div class="hint-header">
            <span>Gợi ý mật khẩu</span>
            <button id="hint-close" class="hint-close">×</button>
        </div>
        <div class="hint-body">Sinh nhật của cậu</div>
    </div>
</div>
<div class="keypad">

<button class="num">1</button>
<button class="num">2</button>
<button class="num">3</button>

<button class="num">4</button>
<button class="num">5</button>
<button class="num">6</button>

<button class="num">7</button>
<button class="num">8</button>
<button class="num">9</button>

<div></div>

<button class="num">0</button>

<button id="delete-btn">
⌫
</button>

</div>

</div>

</div>

</section>

<!-- HOME -->

<section id="home-screen" class="hidden">

<h1 class="title">
For NiNi ❤️
</h1>

<div class="menu-grid">

<div class="menu-card" onclick="openPage('music')">

<i class="fa-solid fa-music"></i>

<span>Music</span>

</div>

<div class="menu-card" onclick="openPage('letter')">

<i class="fa-solid fa-envelope"></i>

<span>Letter</span>

</div>

<div class="menu-card" onclick="openPage('gallery')">

<i class="fa-solid fa-image"></i>

<span>Images</span>

</div>

<div class="menu-card" onclick="openPage('gift')">

<i class="fa-solid fa-gift"></i>

<span>Gift</span>

</div>

</div>

</section>

<!-- MUSIC -->

<section id="music" class="page hidden">

<div class="window">

<button class="close-btn"
onclick="closePage('music')">
×
</button>

<h2 class="music-title">🎧 Music Player</h2>

<div class="music-player">

<div class="now-playing">
<img id="current-cover" src="images/IMG_7520.JPG" alt="Bài đang phát">
<h3 id="current-title">Tớ</h3>
<div class="time-row">
<span id="current-time">0:00</span>
<span id="duration-time">0:00</span>
</div>
<div class="progress-bar">
<div id="progress-fill"></div>
</div>
<div class="player-controls">
<button id="prevBtn" type="button"><i class="fa-solid fa-backward-step"></i></button>
<button id="mainPlayBtn" type="button"><i class="fa-solid fa-play"></i></button>
<button id="nextBtn" type="button"><i class="fa-solid fa-forward-step"></i></button>
</div>
</div>

<div class="playlist">
<button class="song-card active" type="button"
data-src="music/Em.mp3"
data-title="Tớ"
data-cover="images/IMG_7520.JPG">
<img src="images/IMG_7520.JPG" alt="Em Là Của Anh">
<span>Tớ</span>
<i class="fa-solid fa-play song-icon"></i>
</button>

<button class="song-card" type="button"
data-src="music/Buông.mp3"
data-title="Thích"
data-cover="images/IMG_7536.JPG">
<img src="images/IMG_7536.JPG" alt="Buông">
<span>Thích</span>
<i class="fa-solid fa-play song-icon"></i>
</button>

<button class="song-card" type="button"
data-src="music/Không buông - Hngle, Ari.mp3"
data-title="Cậu"
data-cover="images/IMG_7555.JPG">
<img src="images/IMG_7555.JPG" alt="Không buông">
<span>Cậu</span>
<i class="fa-solid fa-play song-icon"></i>
</button>
</div>

</div>

<audio id="audio"></audio>

</div>

</section>

<!-- LETTER -->

<section id="letter" class="page hidden">

<div class="window">

<button class="close-btn"
onclick="closePage('letter')">
×
</button>

<h2>💌 Gửi NiNi</h2>

<p id="typing"></p>

</div>

</section>

<!-- GALLERY -->

<section id="gallery" class="page hidden">

<div class="window">

<button class="close-btn"
onclick="closePage('gallery')">
×
</button>

<h2>📷 Kỷ Niệm</h2>

<div class="gallery-grid">

<img src="images/730948705_1334483012113826_7963450557296195364_n.jpg">
<img src="images/IMG_7522.JPG" >
<img src="images/IMG_7527.JPG" >
<img src="images/IMG_7530.JPG" >
<img src="images/IMG_7534.JPG" >
<img src="images/IMG_7538.JPG" >
<img src="images/IMG_7542.JPG" >
<img src="images/IMG_7548.JPG" >
<img src="images/IMG_7563.JPG" >
<img src="images/IMG_7591.JPG" >
<img src="images/IMG_7601.JPG" >

</div>

</div>

</section>

<!-- GIFT -->

<section id="gift" class="page hidden">

<div class="window">

<button class="close-btn"
onclick="closePage('gift')">
×
</button>

<h2>Love You</h2>

<p class="gift-text">

    Những kỷ niệm của chúng ta sẽ bay cao, bay xa...
    <br>
    Cảm ơn cậu vì tất cả ❤️

</p>

</div>

</section>

<script src="script.js"></script>

</body>
</html>
